# Generated into %USERPROFILE%\.cli-proxy-api\droidproxy-commandcode-lab-config.yaml
# CLIProxyAPI listens on the lab backend port. The frontend proxy uses a separate lab port.
port: __BACKEND_PORT__
host: 127.0.0.1

remote-management:
  allow-remote: false
  secret-key: "__MANAGEMENT_SECRET_KEY__"

auth-dir: "~/.cli-proxy-api"

debug: __DEBUG__
logging-to-file: __DEBUG__
usage-statistics-enabled: true
proxy-url: ""
request-retry: __REQUEST_RETRY__
request-timeout: "__REQUEST_TIMEOUT__"
disable-cooling: true

routing:
  strategy: "round-robin"
  session-affinity: true
  session-affinity-ttl: "2h"

quota-exceeded:
  switch-project: true
  switch-preview-model: true

generative-language-api-key: []
